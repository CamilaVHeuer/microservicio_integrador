spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

helipagos:
  base-url: ${HELIPAGOS_BASE_URL}
  token: ${HELIPAGOS_TOKEN}

app:
  redirect-url: ${REDIRECT_URL}
  webhook-url: ${WEBHOOK_URL}