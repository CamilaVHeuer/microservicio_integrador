spring:
  datasource:
    url: jdbc:h2:mem:payments_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

helipagos:
  base-url: ${HELIPAGOS_BASE_URL}
  token: ${HELIPAGOS_TOKEN}
  create-payment-path: ${HELIPAGOS_CREATE_PAYMENT_PATH}
  get-payment-path: ${HELIPAGOS_GET_PAYMENT_PATH}
  cancel-payment-path: ${HELIPAGOS_CANCEL_PAYMENT_PATH}

app:
  redirect-url: ${REDIRECT_URL}
  webhook-url: ${WEBHOOK_URL}
  api-key: ${API_KEY}

logging:
  level:
    org.springframework.web.client: DEBUG