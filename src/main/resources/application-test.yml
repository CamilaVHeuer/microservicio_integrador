spring:
  datasource:
    url: jdbc:h2:mem:payments_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.springframework.test: INFO

helipagos:
  base-url: http://helipagos/fake-url-test
  token: fake-token-test
  create-payment-path: /create
  get-payment-path: /get
  cancel-payment-path: /cancel

app:
  redirect-url: http://redirect-test
  webhook-url: http://webhook-test
  api-key: test-api-key